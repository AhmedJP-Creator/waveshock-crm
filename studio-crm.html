<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WAVESHOCK CRM</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #c0392b; --red-bright: #e74c3c;
    --dark: #0d0d0d; --card: #161616; --card2: #1e1e1e;
    --border: #2a2a2a; --text: #e8e8e8; --muted: #666;
    --gold: #f0a500; --green: #27ae60; --orange: #e67e22;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--dark); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }

  header {
    background: linear-gradient(135deg, #1a0000 0%, #0d0d0d 60%);
    border-bottom: 1px solid var(--border);
    padding: 0 24px; display: flex; align-items: center; justify-content: space-between;
    height: 64px; position: sticky; top: 0; z-index: 100;
  }
  .logo { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800; }
  .logo span { color: var(--red-bright); }
  .header-actions { display: flex; gap: 8px; align-items: center; }

  .sync-btn {
    display: flex; align-items: center; gap: 6px;
    background: #1e3a1e; border: 1px solid #2a5a2a;
    color: #5dbb6a; padding: 8px 14px; border-radius: 8px;
    font-size: 13px; font-family: 'DM Mono', monospace; cursor: pointer; transition: all 0.2s;
  }
  .sync-btn:hover { background: #254a25; }
  .btn-primary { background: var(--red); color: #fff; border: none; padding: 9px 18px; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; transition: background 0.2s; }
  .btn-primary:hover { background: var(--red-bright); }

  .sync-bar { background: #0d1a0d; border-bottom: 1px solid #1a3a1a; padding: 8px 24px; display: flex; align-items: center; justify-content: space-between; font-size: 12px; font-family: 'DM Mono', monospace; color: #5dbb6a; }
  .sync-bar.error { background: #1a0d0d; border-color: #3a1a1a; color: var(--red-bright); }
  .sync-bar.hidden { display: none; }

  .stats-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px; background: var(--border); border-bottom: 1px solid var(--border); }
  .stat { background: var(--card); padding: 20px 24px; }
  .stat-label { font-size: 11px; font-family: 'DM Mono', monospace; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
  .stat-value { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 800; }
  .stat-value.red { color: var(--red-bright); }
  .stat-value.green { color: var(--green); }
  .stat-value.gold { color: var(--gold); }

  main { padding: 24px; max-width: 1400px; margin: 0 auto; }
  .toolbar { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
  .search-wrap { position: relative; flex: 1; min-width: 200px; }
  .search-wrap input { width: 100%; background: var(--card); border: 1px solid var(--border); color: var(--text); padding: 10px 14px 10px 36px; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none; transition: border-color 0.2s; }
  .search-wrap input:focus { border-color: var(--red); }
  .search-icon { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--muted); }
  .filter-btn { background: var(--card); border: 1px solid var(--border); color: var(--muted); padding: 9px 14px; border-radius: 8px; font-size: 12px; cursor: pointer; transition: all 0.2s; font-family: 'DM Mono', monospace; }
  .filter-btn.active, .filter-btn:hover { border-color: var(--red); color: var(--text); background: #1a0a0a; }

  .table-wrap { background: var(--card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  table { width: 100%; border-collapse: collapse; }
  thead tr { background: var(--card2); border-bottom: 1px solid var(--border); }
  th { text-align: left; padding: 12px 16px; font-size: 11px; font-family: 'DM Mono', monospace; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; white-space: nowrap; }
  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.15s; cursor: pointer; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #1c1c1c; }
  td { padding: 13px 16px; font-size: 14px; vertical-align: middle; }
  .client-name { font-weight: 500; }
  .client-sub { font-size: 12px; color: var(--muted); font-family: 'DM Mono', monospace; }

  .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-family: 'DM Mono', monospace; }
  .badge-single { background: #1a1a2e; color: #7b8cde; border: 1px solid #2a2a4e; }
  .badge-3song { background: #1a2e1a; color: #5dbb6a; border: 1px solid #2a4e2a; }
  .badge-5song { background: #2e1a00; color: var(--gold); border: 1px solid #4e3a00; }

  .pay-badge { display: inline-flex; align-items: center; gap: 5px; padding: 4px 10px; border-radius: 6px; font-size: 12px; font-family: 'DM Mono', monospace; }
  .pay-paid { background: #0d2b1a; color: #27ae60; border: 1px solid #1a4a2a; }
  .pay-pending { background: #2b1a00; color: var(--orange); border: 1px solid #4a3a00; }
  .pay-partial { background: #2b2b00; color: #e0e020; border: 1px solid #4a4a00; }

  .progress-steps { display: flex; gap: 3px; margin-bottom: 3px; }
  .step { width: 20px; height: 5px; border-radius: 3px; background: var(--border); }
  .step.done { background: var(--green); }
  .step.active { background: var(--gold); }
  .progress-dot { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; color: var(--muted); }
  .dot { width: 7px; height: 7px; border-radius: 50%; }
  .dot-green { background: var(--green); }
  .dot-orange { background: var(--orange); }
  .dot-blue { background: #5daaff; }
  .dot-grey { background: #444; }
  .dot-gold { background: var(--gold); }

  .source-tag { font-size: 10px; font-family: 'DM Mono', monospace; padding: 2px 7px; border-radius: 4px; }
  .source-form { background: #1a2e1a; color: #5dbb6a; }
  .source-manual { background: #1a1a2e; color: #7b8cde; }

  .action-btns { display: flex; gap: 5px; }
  .icon-btn { background: none; border: 1px solid var(--border); color: var(--muted); padding: 5px 8px; border-radius: 6px; cursor: pointer; font-size: 12px; transition: all 0.15s; }
  .icon-btn:hover { border-color: var(--red); color: var(--text); }

  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); display: flex; align-items: center; justify-content: center; z-index: 200; padding: 20px; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal { background: var(--card); border: 1px solid var(--border); border-radius: 14px; width: 100%; max-width: 560px; max-height: 90vh; overflow-y: auto; transform: translateY(20px); transition: transform 0.2s; }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal-header { padding: 20px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .modal-title { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700; }
  .close-btn { background: none; border: none; color: var(--muted); font-size: 22px; cursor: pointer; }
  .modal-body { padding: 24px; display: grid; gap: 14px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group.full { grid-column: 1 / -1; }
  label { font-size: 11px; font-family: 'DM Mono', monospace; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
  input, select, textarea { background: var(--card2); border: 1px solid var(--border); color: var(--text); padding: 10px 12px; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none; transition: border-color 0.2s; }
  input:focus, select:focus, textarea:focus { border-color: var(--red); }
  select option { background: var(--card2); }
  textarea { resize: vertical; min-height: 70px; }
  .modal-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 10px; }
  .btn-cancel { background: none; border: 1px solid var(--border); color: var(--muted); padding: 9px 18px; border-radius: 8px; cursor: pointer; font-size: 14px; }

  .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty-state .icon { font-size: 40px; margin-bottom: 12px; }

  .new-alert { position: fixed; bottom: 24px; right: 24px; background: #0d2b1a; border: 1px solid #27ae60; border-radius: 12px; padding: 16px 20px; font-size: 13px; color: #5dbb6a; font-family: 'DM Mono', monospace; z-index: 300; transform: translateY(120px); transition: transform 0.3s; max-width: 280px; }
  .new-alert.show { transform: translateY(0); }
  .new-alert strong { display: block; font-size: 14px; margin-bottom: 4px; color: #27ae60; }

  @media (max-width: 768px) {
    .stats-bar { grid-template-columns: repeat(2, 1fr); }
    main { padding: 16px; } header { padding: 0 16px; }
    .form-row { grid-template-columns: 1fr; }
    th:nth-child(5), td:nth-child(5), th:nth-child(6), td:nth-child(6) { display: none; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">WAVE<span>SHOCK</span> CRM</div>
  <div class="header-actions">
    <button class="sync-btn" id="syncBtn" onclick="syncFromSheets()">
      <span id="syncIcon">📊</span> <span id="syncText">Sync Bookings</span>
    </button>
    <button class="btn-primary" onclick="openModal()">+ New Client</button>
  </div>
</header>

<div class="sync-bar hidden" id="syncBar">
  <span id="syncMsg">Ready</span>
  <span id="syncTime"></span>
</div>

<div class="stats-bar">
  <div class="stat"><div class="stat-label">Total Clients</div><div class="stat-value red" id="statTotal">0</div></div>
  <div class="stat"><div class="stat-label">Revenue (¥)</div><div class="stat-value green" id="statRevenue">¥0</div></div>
  <div class="stat"><div class="stat-label">Unpaid (¥)</div><div class="stat-value gold" id="statUnpaid">¥0</div></div>
  <div class="stat"><div class="stat-label">Active Sessions</div><div class="stat-value red" id="statActive">0</div></div>
</div>

<main>
  <div class="toolbar">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" placeholder="Search clients..." id="searchInput" oninput="renderTable()">
    </div>
    <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
    <button class="filter-btn" onclick="setFilter('single',this)">Single</button>
    <button class="filter-btn" onclick="setFilter('3song',this)">3 Song</button>
    <button class="filter-btn" onclick="setFilter('5song',this)">5 Song</button>
    <button class="filter-btn" onclick="setFilter('pending',this)">Unpaid</button>
    <button class="filter-btn" onclick="setFilter('form',this)">📋 From Form</button>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Client</th><th>Package</th><th>Session Date</th>
          <th>Payment</th><th>Progress</th><th>Source</th><th></th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
    <div class="empty-state" id="emptyState" style="display:none">
      <div class="icon">🎙️</div>
      <p>No clients yet. Hit <strong>Sync Bookings</strong> to pull from your Google Form.</p>
    </div>
  </div>
</main>

<!-- CLIENT MODAL -->
<div class="modal-overlay" id="clientModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">New Client</div>
      <button class="close-btn" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group"><label>Client Name</label><input type="text" id="fName" placeholder="Full name"></div>
        <div class="form-group"><label>Instagram / Contact</label><input type="text" id="fContact" placeholder="@handle or phone"></div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Package</label>
          <select id="fPackage">
            <option value="single">Single Song — ¥20,000</option>
            <option value="3song">3 Song Bundle — ¥50,000</option>
            <option value="5song">5 Song Bundle — ¥80,000</option>
          </select>
        </div>
        <div class="form-group"><label>Session Date</label><input type="date" id="fDate"></div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Payment Status</label>
          <select id="fPayment">
            <option value="pending">Pending</option>
            <option value="partial">Partial</option>
            <option value="paid">Paid</option>
          </select>
        </div>
        <div class="form-group"><label>Amount Paid (¥)</label><input type="number" id="fAmountPaid" placeholder="0"></div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Progress Stage</label>
          <select id="fProgress">
            <option value="booked">Booked</option>
            <option value="recorded">Recorded</option>
            <option value="mixing">Mixing</option>
            <option value="mastering">Mastering</option>
            <option value="delivered">Delivered</option>
          </select>
        </div>
        <div class="form-group"><label>Song Title(s)</label><input type="text" id="fSongs" placeholder="e.g. Track 1, Track 2"></div>
      </div>
      <div class="form-group full"><label>Notes</label><textarea id="fNotes" placeholder="Vibe, refs, anything important..."></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-primary" onclick="saveClient()">Save Client</button>
    </div>
  </div>
</div>

<div class="new-alert" id="newAlert">
  <strong>🎙️ New Booking!</strong>
  <span id="alertMsg"></span>
</div>

<script>
const SHEET_ID = '1IF3XDo4QyXQxwGTiThtFPWpEyIBlkzdWJJ3Z9zq7Qso';
const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv`;

let clients = JSON.parse(localStorage.getItem('waveshockClients') || '[]');
let editingId = null;
let currentFilter = 'all';

const PACKAGES = {
  single: { label: 'Single Song', price: 20000 },
  '3song': { label: '3 Song Bundle', price: 50000 },
  '5song': { label: '5 Song Bundle', price: 80000 },
};
const PROGRESS_CONFIG = {
  booked:    { label: 'Booked',    dot: 'dot-grey',   steps: 1 },
  recorded:  { label: 'Recorded',  dot: 'dot-blue',   steps: 2 },
  mixing:    { label: 'Mixing',    dot: 'dot-orange', steps: 3 },
  mastering: { label: 'Mastering', dot: 'dot-gold',   steps: 4 },
  delivered: { label: 'Delivered', dot: 'dot-green',  steps: 5 },
};

function save() { localStorage.setItem('waveshockClients', JSON.stringify(clients)); }

async function syncFromSheets() {
  const icon = document.getElementById('syncIcon');
  const text = document.getElementById('syncText');
  const bar = document.getElementById('syncBar');
  const msg = document.getElementById('syncMsg');
  const time = document.getElementById('syncTime');

  icon.textContent = '⏳'; text.textContent = 'Syncing...';
  bar.className = 'sync-bar';
  msg.textContent = 'Connecting to Google Sheets...';
  bar.classList.remove('hidden');

  try {
    const res = await fetch(SHEET_URL + '&t=' + Date.now());
    if (!res.ok) throw new Error('Failed');
    const csv = await res.text();
    const rows = parseCSV(csv);
    if (rows.length < 2) { msg.textContent = 'No form submissions yet.'; return; }

    const headers = rows[0].map(h => h.toLowerCase().trim());
    let newCount = 0;

    for (let i = 1; i < rows.length; i++) {
      const row = rows[i];
      if (!row || row.length < 2) continue;

      const get = (...keys) => {
        for (const k of keys) {
          const idx = headers.findIndex(h => h.includes(k));
          if (idx !== -1) return (row[idx] || '').trim();
        }
        return '';
      };

      const timestamp = get('timestamp');
      const name = get('name', 'full');
      const contact = get('instagram', 'contact', 'phone', 'handle');
      const packageRaw = get('package', 'bundle', 'option');
      const date = get('date', 'session', 'preferred');
      const notes = get('know', 'note', 'anything', 'info');

      if (!name) continue;

      let pkg = 'single';
      const pl = packageRaw.toLowerCase();
      if (pl.includes('3') || pl.includes('50')) pkg = '3song';
      else if (pl.includes('5') || pl.includes('80')) pkg = '5song';

      const uid = 'form_' + (timestamp + name).replace(/[^a-z0-9]/gi, '_');
      if (clients.find(c => c.id === uid)) continue;

      clients.unshift({
        id: uid, name, contact, package: pkg,
        date: formatDate(date), payment: 'pending',
        amountPaid: '', progress: 'booked',
        songs: '', notes, source: 'form',
        createdAt: Date.now(),
      });
      newCount++;
    }

    save();
    renderTable();
    const now = new Date().toLocaleTimeString();
    localStorage.setItem('lastSync', now);
    time.textContent = 'Last sync: ' + now;

    if (newCount > 0) {
      msg.textContent = `✅ ${newCount} new booking${newCount > 1 ? 's' : ''} imported!`;
      showAlert(`${newCount} new booking${newCount > 1 ? 's' : ''} pulled from your form`);
    } else {
      msg.textContent = '✅ Up to date — no new bookings';
    }
  } catch (e) {
    bar.className = 'sync-bar error';
    msg.textContent = '❌ Sync failed — check your Sheet is set to "Anyone with link can view"';
  } finally {
    icon.textContent = '📊'; text.textContent = 'Sync Bookings';
  }
}

function parseCSV(text) {
  return text.split('\n').filter(l => l.trim()).map(line => {
    const cols = []; let cur = '', inQ = false;
    for (const ch of line) {
      if (ch === '"') { inQ = !inQ; continue; }
      if (ch === ',' && !inQ) { cols.push(cur); cur = ''; continue; }
      cur += ch;
    }
    cols.push(cur);
    return cols;
  });
}

function formatDate(str) {
  if (!str) return '';
  try { const d = new Date(str); return isNaN(d) ? '' : d.toISOString().split('T')[0]; }
  catch { return ''; }
}

function showAlert(m) {
  const el = document.getElementById('newAlert');
  document.getElementById('alertMsg').textContent = m;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 5000);
}

setInterval(syncFromSheets, 5 * 60 * 1000);

function updateStats() {
  let revenue = 0, unpaid = 0, active = 0;
  clients.forEach(c => {
    const price = PACKAGES[c.package]?.price || 0;
    const paid = parseInt(c.amountPaid) || 0;
    if (c.payment === 'paid') revenue += price;
    else if (c.payment === 'partial') { revenue += paid; unpaid += price - paid; }
    else unpaid += price;
    if (c.progress !== 'delivered') active++;
  });
  document.getElementById('statTotal').textContent = clients.length;
  document.getElementById('statRevenue').textContent = '¥' + revenue.toLocaleString();
  document.getElementById('statUnpaid').textContent = '¥' + unpaid.toLocaleString();
  document.getElementById('statActive').textContent = active;
}

function renderTable() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const tbody = document.getElementById('tableBody');
  const empty = document.getElementById('emptyState');

  const filtered = clients.filter(c => {
    const ms = !q || c.name.toLowerCase().includes(q) || (c.contact||'').toLowerCase().includes(q);
    const mf = currentFilter === 'all' ? true :
      currentFilter === 'pending' ? c.payment !== 'paid' :
      currentFilter === 'form' ? c.source === 'form' :
      c.package === currentFilter;
    return ms && mf;
  });

  tbody.innerHTML = '';
  empty.style.display = filtered.length === 0 ? 'block' : 'none';

  filtered.forEach(c => {
    const pkg = PACKAGES[c.package];
    const prog = PROGRESS_CONFIG[c.progress] || PROGRESS_CONFIG.booked;
    const dateStr = c.date ? new Date(c.date + 'T12:00:00').toLocaleDateString('en-US', { month:'short', day:'numeric', year:'2-digit' }) : '—';
    const payClass = c.payment === 'paid' ? 'pay-paid' : c.payment === 'partial' ? 'pay-partial' : 'pay-pending';
    const payLabel = c.payment === 'paid' ? '● Paid' : c.payment === 'partial' ? '◑ Partial' : '○ Pending';
    const pkgClass = c.package === 'single' ? 'badge-single' : c.package === '3song' ? 'badge-3song' : 'badge-5song';
    let steps = '';
    for (let i = 1; i <= 5; i++) steps += `<div class="step ${i < prog.steps ? 'done' : i === prog.steps ? 'active' : ''}"></div>`;

    const tr = document.createElement('tr');
    tr.onclick = () => editClient(c.id);
    tr.innerHTML = `
      <td><div class="client-name">${esc(c.name)}</div>${c.contact ? `<div class="client-sub">${esc(c.contact)}</div>` : ''}</td>
      <td><span class="badge ${pkgClass}">${pkg?.label || c.package}</span></td>
      <td style="font-family:'DM Mono',monospace;font-size:13px">${dateStr}</td>
      <td><span class="pay-badge ${payClass}">${payLabel}</span></td>
      <td><div class="progress-steps">${steps}</div><div class="progress-dot"><span class="dot ${prog.dot}"></span>${prog.label}</div></td>
      <td><span class="source-tag ${c.source === 'form' ? 'source-form' : 'source-manual'}">${c.source === 'form' ? '📋 Form' : '✏️ Manual'}</span></td>
      <td onclick="event.stopPropagation()"><div class="action-btns"><button class="icon-btn" onclick="editClient('${c.id}')">✏️</button><button class="icon-btn" onclick="deleteClient('${c.id}')">🗑</button></div></td>
    `;
    tbody.appendChild(tr);
  });
  updateStats();
}

function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderTable();
}

function openModal() { editingId = null; document.getElementById('modalTitle').textContent = 'New Client'; clearForm(); document.getElementById('clientModal').classList.add('open'); }
function closeModal() { document.getElementById('clientModal').classList.remove('open'); }
function clearForm() {
  ['fName','fContact','fDate','fAmountPaid','fSongs','fNotes'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('fPackage').value = 'single';
  document.getElementById('fPayment').value = 'pending';
  document.getElementById('fProgress').value = 'booked';
}

function editClient(id) {
  const c = clients.find(x => x.id === id);
  if (!c) return;
  editingId = id;
  document.getElementById('modalTitle').textContent = 'Edit Client';
  document.getElementById('fName').value = c.name || '';
  document.getElementById('fContact').value = c.contact || '';
  document.getElementById('fPackage').value = c.package || 'single';
  document.getElementById('fDate').value = c.date || '';
  document.getElementById('fPayment').value = c.payment || 'pending';
  document.getElementById('fAmountPaid').value = c.amountPaid || '';
  document.getElementById('fProgress').value = c.progress || 'booked';
  document.getElementById('fSongs').value = c.songs || '';
  document.getElementById('fNotes').value = c.notes || '';
  document.getElementById('clientModal').classList.add('open');
}

function saveClient() {
  const name = document.getElementById('fName').value.trim();
  if (!name) { alert('Client name is required.'); return; }
  const existing = editingId ? clients.find(c => c.id === editingId) : null;
  const data = {
    id: editingId || Date.now().toString(), name,
    contact: document.getElementById('fContact').value.trim(),
    package: document.getElementById('fPackage').value,
    date: document.getElementById('fDate').value,
    payment: document.getElementById('fPayment').value,
    amountPaid: document.getElementById('fAmountPaid').value,
    progress: document.getElementById('fProgress').value,
    songs: document.getElementById('fSongs').value.trim(),
    notes: document.getElementById('fNotes').value.trim(),
    source: existing?.source || 'manual',
    createdAt: existing?.createdAt || Date.now(),
  };
  if (editingId) { const idx = clients.findIndex(c => c.id === editingId); clients[idx] = data; }
  else clients.unshift(data);
  save(); renderTable(); closeModal();
}

function deleteClient(id) {
  if (!confirm('Delete this client?')) return;
  clients = clients.filter(c => c.id !== id);
  save(); renderTable();
}

window.onload = function() {
  const lastSync = localStorage.getItem('lastSync');
  if (lastSync) {
    document.getElementById('syncBar').classList.remove('hidden');
    document.getElementById('syncMsg').textContent = '✅ Ready';
    document.getElementById('syncTime').textContent = 'Last sync: ' + lastSync;
  }
  renderTable();
  syncFromSheets();
};
</script>
</body>
